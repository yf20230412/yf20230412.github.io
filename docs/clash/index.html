        // 爆闪背景动画 - 减慢版
        function createFlashEffect() {
            const bg = document.getElementById('flash-bg');
            const colors = [
                '#ff0000', '#00ff00', '#0000ff', '#ffff00', 
                '#ff00ff', '#00ffff', '#ff9900', '#9900ff',
                '#ff0099', '#00ff99', '#99ff00', '#0099ff'
            ];
            
            function flash() {
                // 随机颜色
                const color1 = colors[Math.floor(Math.random() * colors.length)];
                const color2 = colors[Math.floor(Math.random() * colors.length)];
                
                // 创建渐变
                bg.style.background = `linear-gradient(135deg, ${color1}, ${color2})`;
                
                // 随机大小和位置变化
                const scale = 1 + Math.random() * 0.2;
                const x = (Math.random() - 0.5) * 10;
                const y = (Math.random() - 0.5) * 10;
                bg.style.transform = `scale(${scale}) translate(${x}px, ${y}px)`;
                
                // 减慢闪烁速度 (500-1500ms)
                const speed = 500 + Math.random() * 1000;
                setTimeout(flash, speed);
            }
            
            // 开始动画
            flash();
            
            // 添加鼠标移动效果
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                bg.style.backgroundPosition = `${x * 100}% ${y * 100}%`;
            });
        }

            // 尝试自动播放
            const playAudio = () => {
                audio.play().then(() => {
                    console.log('音乐自动播放成功');
                }).catch(error => {
                    console.log('自动播放被阻止:', error);
                    // 如果自动播放失败，显示一个提示
                    showAudioPrompt();
                });
            };
            
            // 显示音频提示
            function showAudioPrompt() {
                const musicPlayer = document.querySelector('.music-player');
                if (!musicPlayer) return;
                
                // 添加提示文本
                const prompt = document.createElement('div');
                prompt.innerHTML = '<span style="color: #ff6b6b; font-size: 12px;">点击任意位置播放音乐</span>';
                prompt.style.marginLeft = '10px';
                musicPlayer.appendChild(prompt);
                
                // 添加点击事件监听器
                document.body.addEventListener('click', function initAudio() {
                    playAudio();
                    // 移除提示
                    if (prompt.parentNode) {
                        prompt.parentNode.removeChild(prompt);
                    }
                    // 移除事件监听器
                    document.body.removeEventListener('click', initAudio);
                }, { once: true });
            }
            
            // 页面加载后尝试播放
            window.addEventListener('load', () => {
                // 延迟播放，确保页面完全加载
                setTimeout(playAudio, 1000);
            });
            
            // 监听音频错误
            audio.addEventListener('error', (e) => {
                console.error('音频加载错误:', e);
                // 尝试备用音频源
                audio.src = 'https://mpimg.cn/view.php/f0a550a20a99c47662db2a7013c2d1e2.mp3';
                setTimeout(playAudio, 1000);
            });
        }
        
        // 主题切换功能
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const body = document.body;
            
            // 检查本地存储中的主题偏好
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark-mode');
                themeIcon.classList.remove('bi-moon');
                themeIcon.classList.add('bi-sun');
            }
            
            // 切换主题
            themeToggle.addEventListener('click', function() {
                body.classList.toggle('dark-mode');
                
                if (body.classList.contains('dark-mode')) {
                    themeIcon.classList.remove('bi-moon');
                    themeIcon.classList.add('bi-sun');
                    localStorage.setItem('theme', 'dark');
                } else {
                    themeIcon.classList.remove('bi-sun');
                    themeIcon.classList.add('bi-moon');
                    localStorage.setItem('theme', 'light');
                }
            });
            
            // 检测系统主题偏好
            const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
            if (prefersDarkScheme.matches && !savedTheme) {
                body.classList.add('dark-mode');
                themeIcon.classList.remove('bi-moon');
                themeIcon.classList.add('bi-sun');
            }
            
            // 监听系统主题变化
            prefersDarkScheme.addEventListener('change', e => {
                if (!savedTheme) {
                    if (e.matches) {
                        body.classList.add('dark-mode');
                        themeIcon.classList.remove('bi-moon');
                        themeIcon.classList.add('bi-sun');
                    } else {
                        body.classList.remove('dark-mode');
                        themeIcon.classList.remove('bi-sun');
                        themeIcon.classList.add('bi-moon');
                    }
                }
            });
            
            // 启动爆闪效果
            createFlashEffect();
            
            // 设置音频自动播放
            setupAudio();
            
            // 标题随机闪光效果
            function titleRandomFlash() {
                const flashes = document.querySelectorAll('.title-flash');
                flashes.forEach(flash => {
                    // 随机延迟启动动画
                    const delay = Math.random() * 2000;
                    setTimeout(() => {
                        flash.style.animationDelay = `${delay}ms`;
                        flash.style.opacity = '0';
                    }, delay);
                });
                
                // 随机改变光晕大小
                setInterval(() => {
                    const glows = document.querySelectorAll('.title-glow');
                    glows.forEach(glow => {
                        const size = 1 + Math.random() * 0.5;
                        glow.style.transform = `scale(${size})`;
                    });
                }, 3000);
            }
            
            titleRandomFlash();
            
            // 为嵌入容器添加随机颜色变化
            const embedContainer = document.querySelector('.embed-container');
            if (embedContainer) {
                setInterval(() => {
                    const hue = Math.floor(Math.random() * 360);
                    embedContainer.style.borderColor = `hsla(${hue}, 80%, 60%, 0.7)`;
                }, 3000);
            }
            
            // 跑马灯广告复制多份以实现无缝循环
            function setupMarquee() {
                const marqueeContent = document.querySelector('.marquee-content');
                const link = marqueeContent.querySelector('a');
                const linkWidth = link.offsetWidth;
                const containerWidth = document.querySelector('.top-marquee').offsetWidth;
                
                // 计算需要复制的链接数量以填满容器
                const copiesNeeded = Math.ceil(containerWidth / linkWidth) * 2;
                
                // 清空并重新添加链接
                marqueeContent.innerHTML = '';
                for (let i = 0; i < copiesNeeded; i++) {
                    const clone = link.cloneNode(true);
                    marqueeContent.appendChild(clone);
                }
            }
            
            // 确保跑马灯在窗口大小改变时也能正常工作
            window.addEventListener('resize', setupMarquee);
            setupMarquee();
            
            // 嵌入内容高度自适应
            function adjustEmbedHeight() {
                const embedContainer = document.getElementById('embedContainer');
                const embedFrame = document.getElementById('embedFrame');
                
                // 监听iframe加载完成
                embedFrame.onload = function() {
                    try {
                        // 尝试获取iframe内容的高度
                        const iframeDoc = embedFrame.contentDocument || embedFrame.contentWindow.document;
                        const iframeHeight = iframeDoc.body.scrollHeight;
                        
                        // 设置容器高度
                        embedContainer.style.height = iframeHeight + 'px';
                        embedFrame.style.height = iframeHeight + 'px';
                        
                        console.log('调整嵌入高度:', iframeHeight);
                    } catch (e) {
                        console.log('跨域限制，无法获取iframe高度:', e);
                        // 如果跨域限制，设置默认高度
                        embedContainer.style.height = '500px';
                        embedFrame.style.height = '500px';
                    }
                };
                
                // 初始设置
                embedContainer.style.height = '500px';
                embedFrame.style.height = '500px';
            }
            
            // 调用高度自适应函数
            adjustEmbedHeight();
            
            // 窗口大小改变时重新调整高度
            window.addEventListener('resize', adjustEmbedHeight);
        });
    </script>
</body>
</html>
